<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171a15" />
    <meta name="color-scheme" content="dark" />
    <title>City Builder Starter Kit - ThreeJS</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #171a15;
        color: #eee8dc;
      }

      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #171a15;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      #app-loading.is-dismissed {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-loading-card {
        display: grid;
        gap: 14px;
        justify-items: center;
        width: min(320px, calc(100vw - 48px));
        text-align: center;
        font-family: Inter, ui-sans-serif, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      }

      .app-loading-spinner {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 3px solid rgba(238, 232, 220, 0.14);
        border-top-color: #d7b463;
        animation: app-loading-spin 900ms linear infinite;
      }

      .app-loading-label {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0.01em;
      }

      .app-loading-detail {
        margin: 0;
        min-height: 1.2em;
        color: #bcb29c;
        font-size: 12px;
        font-weight: 500;
        line-height: 1.35;
      }

      .app-loading-spinner.is-hidden {
        display: none;
      }

      .app-loading-retry {
        margin-top: 4px;
        padding: 10px 18px;
        border: 1px solid rgba(215, 180, 99, 0.45);
        border-radius: 8px;
        background: rgba(215, 180, 99, 0.12);
        color: #eee8dc;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .app-loading-retry:hover {
        background: rgba(215, 180, 99, 0.22);
      }

      .session-connection-overlay {
        position: fixed;
        inset: 0;
        z-index: 9000;
        display: grid;
        place-items: center;
        background: rgba(23, 26, 21, 0.82);
        backdrop-filter: blur(4px);
        font-family: Inter, ui-sans-serif, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      }

      .session-connection-card {
        display: grid;
        gap: 14px;
        justify-items: center;
        width: min(320px, calc(100vw - 48px));
        text-align: center;
      }

      @keyframes app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loading" aria-live="polite" aria-busy="true">
      <div class="app-loading-card">
        <div class="app-loading-spinner" aria-hidden="true"></div>
        <p class="app-loading-label" data-loading-label>Starting world…</p>
        <p class="app-loading-detail" data-loading-detail>Preparing renderer</p>
        <button type="button" class="app-loading-retry" data-loading-retry hidden>Retry connection</button>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
